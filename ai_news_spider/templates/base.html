<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}AI News Spider{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3e8;
        --panel: #fffdf8;
        --text: #1f2937;
        --muted: #6b7280;
        --line: #d6c9ae;
        --accent: #9a3412;
        --accent-soft: #f3e2cf;
        --ok: #166534;
        --warn: #9a3412;
        --bad: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Source Han Serif SC", "Noto Serif SC", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(154, 52, 18, 0.15), transparent 30%),
          linear-gradient(180deg, #f9f6ef 0%, var(--bg) 100%);
        min-height: 100vh;
      }
      a { color: var(--accent); text-decoration: none; }
      header {
        padding: 24px 32px 16px;
        border-bottom: 1px solid rgba(154, 52, 18, 0.12);
      }
      header nav {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        align-items: center;
      }
      .brand { font-size: 28px; font-weight: 700; letter-spacing: 0.02em; }
      .nav-links { display: flex; gap: 16px; font-size: 15px; }
      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 20px 48px;
      }
      .grid {
        display: grid;
        gap: 20px;
      }
      .grid.two { grid-template-columns: 1.1fr 0.9fr; }
      .card {
        background: rgba(255, 253, 248, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(154, 52, 18, 0.18);
        border-radius: 18px;
        box-shadow: 0 20px 50px rgba(53, 36, 21, 0.08);
        padding: 22px;
      }
      h1, h2, h3 { margin: 0 0 12px; }
      h1 { font-size: 34px; line-height: 1.1; }
      h2 { font-size: 22px; }
      p, li, td, th, label, input, textarea, button { font-size: 15px; }
      .muted { color: var(--muted); }
      .error {
        color: var(--bad);
        background: #fee2e2;
        border: 1px solid #fecaca;
        padding: 12px 14px;
        border-radius: 12px;
      }
      form {
        display: grid;
        gap: 14px;
      }
      input, textarea, button {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 12px 14px;
        font: inherit;
        background: white;
      }
      textarea { min-height: 120px; resize: vertical; }
      button {
        cursor: pointer;
        font-weight: 700;
        color: white;
        border: none;
        background: linear-gradient(135deg, #9a3412 0%, #c2410c 100%);
      }
      button.secondary {
        color: var(--accent);
        background: var(--accent-soft);
        border: 1px solid rgba(154, 52, 18, 0.18);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        text-align: left;
        vertical-align: top;
        border-bottom: 1px solid rgba(214, 201, 174, 0.8);
        padding: 10px 8px;
      }
      .pill {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
      }
      .status-succeeded { color: var(--ok); }
      .status-failed { color: var(--bad); }
      .status-running { color: var(--warn); }
      pre {
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
        background: #241d16;
        color: #f8f1e5;
        padding: 16px;
        border-radius: 16px;
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .actions form {
        display: inline-flex;
      }
      @media (max-width: 900px) {
        .grid.two { grid-template-columns: 1fr; }
        header { padding: 20px; }
        h1 { font-size: 28px; }
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <div class="brand">AI News Spider</div>
        <div class="nav-links">
          <a href="/">生成页</a>
          <a href="/tools/url-selector">选择器工具</a>
          <a href="/sites">站点管理</a>
        </div>
      </nav>
    </header>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
